<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#173404">
<title>SignalTrade BTC</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icons/icon-192.png">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<link rel="stylesheet" href="css/styles.css">
</head>
<body>
<header>
  <div class="header-top">
    <div class="menu-wrap">
      <button id="menu-btn" class="menu-btn" type="button" aria-label="Menu">☰</button>
      <div id="menu-dropdown" class="menu-dropdown" style="display:none;">
        <button id="menu-item-levels" class="menu-item" type="button">Détection des niveaux</button>
      </div>
    </div>
    <h1>SignalTrade</h1>
    <button id="refresh-btn">Actualiser</button>
  </div>
  <div class="page-tabs">
    <button id="tab-market-btn" class="page-tab active" type="button">Marché</button>
    <button id="tab-portfolio-btn" class="page-tab" type="button">Portefeuille<span id="portfolio-tab-badge" class="tab-badge" style="display:none;"></span></button>
  </div>
  <div id="market-controls">
    <div class="search-wrap">
      <input type="text" id="search-input" placeholder="Rechercher une paire (top 500)…" autocomplete="off" autocapitalize="characters">
      <button id="search-clear" aria-label="Effacer la recherche" style="display:none;">×</button>
      <div id="search-suggestions" class="search-suggestions" style="display:none;"></div>
    </div>
    <div class="view-toggle">
      <button id="view-default-btn" class="view-btn active" type="button">Top 10</button>
      <button id="view-favorites-btn" class="view-btn" type="button">Favoris</button>
      <button id="view-buy-btn" class="view-btn icon-btn buy" type="button" aria-label="Top 10 achat/conservation" title="Top 10 achat/conservation">👍</button>
      <button id="view-sell-btn" class="view-btn icon-btn sell" type="button" aria-label="Top 10 vente prioritaire" title="Top 10 vente prioritaire">👎</button>
    </div>
    <p id="status">Chargement…</p>
    <div id="macro-row" class="macro-row"></div>
  </div>
</header>
<main>
  <div id="market-page">
    <div id="powerlaw-container"></div>
    <div id="cards"></div>
  </div>
  <div id="portfolio-page" style="display:none;">
    <div class="drive-sync">
      <button id="drive-connect-btn" class="drive-btn primary" type="button">Connecter Google Drive</button>
      <button id="drive-save-btn" class="drive-btn" type="button" style="display:none;">Sauvegarder</button>
      <button id="drive-restore-btn" class="drive-btn" type="button" style="display:none;">Restaurer</button>
      <p id="drive-status" class="drive-status"></p>
    </div>
    <div class="drive-sync">
      <button id="notif-enable-btn" class="drive-btn" type="button" style="display:none;">🔔 Activer les alertes stop-loss</button>
      <p id="notif-status" class="drive-status"></p>
    </div>
    <div class="portfolio-summary">
      <p class="portfolio-value" id="portfolio-total-value">—</p>
      <p class="portfolio-pnl" id="portfolio-total-pnl"></p>
      <p class="portfolio-cash" id="portfolio-cash"></p>
    </div>
    <div id="portfolio-alert"></div>
    <div id="portfolio-holdings" class="portfolio-holdings"></div>
  </div>
</main>
<p class="footer-note">
  Outil d'aide à la décision. Ne constitue pas un conseil financier.
  Aucune position ne doit être ouverte sans supervision humaine et backtest préalable.
</p>

<div id="portfolio-actions" class="portfolio-actions" style="display:none;">
  <button id="btn-buy" class="trade-btn buy" type="button">Achat</button>
  <button id="btn-sell" class="trade-btn sell" type="button">Vente</button>
</div>

<div id="trade-modal" class="trade-modal" style="display:none;">
  <div class="trade-modal-content">
    <h2 id="trade-modal-title">Achat</h2>
    <div class="search-wrap">
      <input type="text" id="trade-symbol-input" placeholder="Rechercher une crypto…" autocomplete="off" autocapitalize="characters">
      <div id="trade-symbol-suggestions" class="search-suggestions" style="display:none;"></div>
    </div>
    <p id="trade-selected-info" class="trade-selected-info"></p>
    <div id="trade-levels-info" class="trade-levels-info"></div>
    <label class="trade-field">
      <span>Montant (USD)</span>
      <input type="number" id="trade-usd-input" inputmode="decimal" min="0" step="any">
    </label>
    <label class="trade-field">
      <span>Quantité</span>
      <input type="number" id="trade-crypto-input" inputmode="decimal" min="0" step="any">
    </label>
    <label class="trade-field" id="trade-percent-field" style="display:none;">
      <span>Part de la position à vendre (<span id="trade-percent-value">0</span>%)</span>
      <input type="range" id="trade-percent-input" min="0" max="100" step="1" value="0">
    </label>
    <label class="trade-field" id="trade-stoploss-field" style="display:none;">
      <span>Stop-loss indicatif (USD)</span>
      <input type="number" id="trade-stoploss-input" inputmode="decimal" min="0" step="any">
    </label>
    <p id="trade-error" class="trade-error" style="display:none;"></p>
    <div class="trade-modal-buttons">
      <button id="trade-cancel-btn" class="trade-modal-btn cancel" type="button">Annuler</button>
      <button id="trade-confirm-btn" class="trade-modal-btn confirm" type="button">Valider</button>
    </div>
  </div>
</div>

<div id="info-modal" class="trade-modal" style="display:none;">
  <div class="trade-modal-content">
    <h2 id="info-modal-title">Détection des niveaux</h2>
    <div id="info-modal-body" class="info-modal-body"></div>
    <div class="trade-modal-buttons">
      <button id="info-close-btn" class="trade-modal-btn cancel" type="button">Fermer</button>
    </div>
  </div>
</div>

<script src="https://accounts.google.com/gsi/client" async defer></script>
<script src="js/config.js"></script>
<script src="js/formatting.js"></script>
<script src="js/indicators.js"></script>
<script src="js/patterns.js"></script>
<script src="js/signalEngine.js"></script>
<script src="js/supertrend.js"></script>
<script src="js/trendRegime.js"></script>
<script src="js/supportResistance.js"></script>
<script src="js/signalDisplay.js"></script>
<script src="js/variations.js"></script>
<script src="js/powerLaw.js"></script>
<script src="js/dataFetcher.js"></script>
<script src="js/app.js"></script>
<script src="js/portfolio.js"></script>
<script src="js/driveSync.js"></script>
</body>
</html>
